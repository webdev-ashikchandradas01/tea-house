<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- css link  -->
    <link rel="stylesheet" href="style.css">
    <!-- Tailwind Css Link  -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts CDN link  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <!-- Font Awsome Kit CDN  -->
    <script src="https://kit.fontawesome.com/4489373255.js" crossorigin="anonymous"></script>
    <!-- Link list End  -->
    <title>Tea House</title>
</head>

<body>
    <header class="flex flex-col md:flex-row items-center justify-center gap-3 p-6 md:p-16 py-10">
        <div class="header-info">
            <h1 class="max-w-[682px]  text-[32px] md:text-[80px] text-[#1C1C1C] font-extrabold">It's good
                tea time at The Tea House</h1>
            <p class="max-w-[513px] text-[#777777] font-medium text-[18px] mt-5">Tea and Botanical Solutions
                Supplier Give
                Optimum
                Satisfaction To
                Your Taste
                Buds.</p>
            <button
                class="bg-gradient-to-l from-[#FF0000] to-[#FF8938] w-[200px] h-[64px] border-0 rounded-[10px] text-[#FFFFFF] font-bold text-[20px] mt-5">
                <span class="flex items-center justify-center gap-3">Explore
                    More <img src="images/arrow.png" alt=""></span>
            </button>
        </div>
        <div class="header-banner relative">
            <img src="images/banner.png" alt="">
            <div class="absolute bg-[#FFFFFF] w-[255px] h-[100px] shadow-md rounded-md bottom-1 left-10">
                <div class="flex items-center justify-center gap-4 p-4">
                    <h3><span class="text-[#FFC850] font-extrabold text-[48px]"><i class="fa-solid fa-star"></i></span>
                    </h3>
                    <div>
                        <h4 class="text-[30px] font-extrabold text-[#1C1C1C]"> 5.00 </h4>
                        <p class="text-[16px] font-semibold text-[#777777] ">Trust Pilot Ratings</p>
                    </div>
                </div>

                </h4>
            </div>
        </div>
    </header>
</body>

</html>
